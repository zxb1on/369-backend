function genCandles(pair, n = 63) {
  const base = BASE[pair] || 1.085;
  const sp = pair === "XAU/USD" ? 0.9 : pair.includes("JPY") ? 0.018 : 0.0028;
  let p = base;
  const now = Date.now();
  const out = [];
  for (let i = n; i >= 0; i--) {
    const o = p;
    const mv = (Math.random() - 0.487) * sp;
    const c = o + mv;
    out.push({
      t: now - i * 3600000,
      o,
      h: Math.max(o, c) + Math.random() * sp * 0.4,
      l: Math.min(o, c) - Math.random() * sp * 0.4,
      c,
      v: Math.floor(Math.random() * 9000 + 3000),
    });
    p = c;
  }
  return out;
}

const calcEMA = (c, p) => {
  const k = 2 / (p + 1);
  let e = c[0].c;
  return c.map((x) => {
    e = x.c * k + e * (1 - k);
    return e;
  });
};

const calcRSI = (c, p = 14) => {
  let g = 0,
    l = 0;
  for (let i = 1; i <= p; i++) {
    const d = c[i].c - c[i - 1].c;
    d > 0 ? (g += d) : (l -= d);
  }
  const r = Array(p).fill(50);
  for (let i = p; i < c.length; i++) {
    const d = c[i].c - c[i - 1].c;
    g = (g * (p - 1) + Math.max(d, 0)) / p;
    l = (l * (p - 1) + Math.max(-d, 0)) / p;
    r.push(l === 0 ? 100 : 100 - 100 / (1 + g / l));
  }
  return r;
};

const calcMACD = (c) => {
  const e12 = calcEMA(c, 12);
  const e26 = calcEMA(c, 26);
  const m = c.map((_, i) => e12[i] - e26[i]);
  const sig = calcEMA(m.map((v) => ({ c: v })), 9);
  return c.map((_, i) => ({
    macd: m[i],
    signal: sig[i],
    hist: m[i] - sig[i] || 0,
  }));
};

const calcBB = (c, p = 20) =>
  c.map((_, i) => {
    if (i < p) return { upper: c[i].h, lower: c[i].l, mid: c[i].c };
    const sl = c.slice(i - p, i).map((x) => x.c);
    const m = sl.reduce((a, b) => a + b, 0) / p;
    const sd = Math.sqrt(sl.reduce((a, b) => a + (b - m) ** 2, 0) / p);
    return { upper: m + 2 * sd, lower: m - 2 * sd, mid: m };
  });

const calcATR = (c, p = 14) => {
  const tr = c.map((x, i) =>
    i === 0 ? x.h - x.l : Math.max(x.h - x.l, Math.abs(x.h - c[i - 1].c), Math.abs(x.l - c[i - 1].c))
  );
  let a = tr.slice(0, p).reduce((x, y) => x + y, 0) / p;
  return c.map((_, i) => {
    if (i < p) return a;
    a = (a * (p - 1) + tr[i]) / p;
    return a;
  });
};

const calcSR = (c) => {
  const hs = c.map((x) => x.h).sort((a, b) => b - a);
  const ls = c.map((x) => x.l).sort((a, b) => a - b);
  return { resistance: [hs[0], hs[3], hs[6]], support: [ls[0], ls[3], ls[6]] };
};

const calcFib = (c) => {
  const hi = Math.max(...c.map((x) => x.h));
  const lo = Math.min(...c.map((x) => x.l));
  const d = hi - lo;
  return { r1: hi, r382: hi - d * 0.382, r500: hi - d * 0.5, r618: hi - d * 0.618, s0: lo };
};

function calcLiquidity(candles) {
  const n = candles.length,
    pools = [],
    orderBlocks = [],
    fvgs = [];
  for (let i = 5; i < n - 5; i++) {
    const c = candles[i],
      tol = c.h * 0.0003;
    const nH = candles.filter((_, j) => Math.abs(j - i) > 2 && Math.abs(candles[j].h - c.h) < tol);
    const nL = candles.filter((_, j) => Math.abs(j - i) > 2 && Math.abs(candles[j].l - c.l) < tol);
    if (nH.length > 1) pools.push({ price: c.h, type: "sell_side", strength: nH.length });
    if (nL.length > 1) pools.push({ price: c.l, type: "buy_side", strength: nL.length });
  }
  for (let i = 5; i < n - 3; i++) {
    const c = candles[i],
      nx = candles.slice(i + 1, i + 4);
    if (nx.filter((x) => x.c > x.o).length >= 2 && nx[nx.length - 1].c > c.h && c.c < c.o)
      orderBlocks.push({ top: c.o, bottom: c.l, type: "bull", idx: i });
    if (nx.filter((x) => x.c < x.o).length >= 2 && nx[nx.length - 1].c < c.l && c.c > c.o)
      orderBlocks.push({ top: c.h, bottom: c.o, type: "bear", idx: i });
  }
  for (let i = 1; i < n - 1; i++) {
    const pv = candles[i - 1],
      nx = candles[i + 1];
    if (nx.l > pv.h) fvgs.push({ top: nx.l, bottom: pv.h, type: "bull", idx: i });
    if (nx.h < pv.l) fvgs.push({ top: pv.l, bottom: nx.h, type: "bear", idx: i });
  }
  const rec = candles.slice(-9);
  const bv = rec.filter((c) => c.c > c.o).reduce((s, c) => s + c.v, 0);
  const sv = rec.filter((c) => c.c < c.o).reduce((s, c) => s + c.v, 0);
  const tot = bv + sv || 1;
  return { pools: pools.slice(-6), orderBlocks: orderBlocks.slice(-4), fvgs: fvgs.slice(-4), buyP: bv / tot, sellP: sv / tot };
}

function buildInd(c) {
  return {
    rsi: calcRSI(c),
    macd: calcMACD(c),
    bb: calcBB(c),
    ema9: calcEMA(c, 9),
    ema21: calcEMA(c, 21),
    sr: calcSR(c),
    fib: calcFib(c),
    atr: calcATR(c),
    liq: calcLiquidity(c),
  };
}

function detectEmotion(log, riskPct) {
  const flags = [],
    rec = log.slice(-6),
    last = rec[rec.length - 1];
  if (last?.outcome === "loss" && Date.now() - last.timestamp < 300000) flags.push("revenge");
  if (riskPct > 3) flags.push("overlever");
  const l3 = rec.slice(-3);
  if (l3.length === 3 && l3.every((t) => t.outcome === "win")) flags.push("greedy");
  if (l3.length === 3 && l3.every((t) => t.outcome === "loss")) flags.push("panic");
  return { flags, calmScore: Math.max(1, 9 - flags.length * 3) };
}

async function kayAnalyze(candles, pair, tf, ind) {
  const last = candles[candles.length - 1];
  const rsiV = ind.rsi[ind.rsi.length - 1];
  const macdV = ind.macd[ind.macd.length - 1];
  const bbV = ind.bb[ind.bb.length - 1];
  const e9 = ind.ema9[ind.ema9.length - 1];
  const e21 = ind.ema21[ind.ema21.length - 1];
  const atrV = ind.atr[ind.atr.length - 1];
  const d = DEC(pair);
  const prompt = `Analyze ${pair} on ${tf}. Return ONLY raw JSON — no markdown, no explanation.

Price: ${last.c.toFixed(d)} | O:${last.o.toFixed(d)} H:${last.h.toFixed(d)} L:${last.l.toFixed(d)}
RSI(14): ${rsiV.toFixed(1)} | MACD hist: ${macdV.hist > 0 ? "positive" : "negative"}
Bollinger: price ${last.c > bbV.upper ? "ABOVE upper (overbought)" : last.c < bbV.lower ? "BELOW lower (oversold)" : "inside bands"}
EMA9: ${e9.toFixed(d)} EMA21: ${e21.toFixed(d)} → ${e9 > e21 ? "Bullish" : "Bearish"} alignment
ATR: ${atrV.toFixed(d)}
Support: ${ind.sr.support.map((x) => x.toFixed(d)).join(", ")}
Resistance: ${ind.sr.resistance.map((x) => x.toFixed(d)).join(", ")}
Order blocks: ${ind.liq.orderBlocks.length} | FVGs: ${ind.liq.fvgs.length}
Buy pressure: ${(ind.liq.buyP * 100).toFixed(0)}% | Sell pressure: ${(ind.liq.sellP * 100).toFixed(0)}%

{"signal":"BUY"|"SELL"|"WAIT","confidence":1-9,"entry":number,"sl":number,"tp1":number,"tp2":number,"tp3":number,"reason":"max 18 words why","pattern":"setup name","tech":1-9,"sentiment":1-9,"macro":1-9,"news_risk":"LOW"|"MEDIUM"|"HIGH","mood":"CALM"|"VOLATILE"|"DANGEROUS","smart":"smart money insight max 15 words","beginner":"plain English 1 sentence","liq":"liquidity note 1 sentence","session":"session context 1 sentence"}`;
  try {
    const r = await callKAY([{ role: "user", content: prompt }], "Return ONLY valid JSON.");
    return JSON.parse(r.replace(/```json|```/g, "").trim());
  } catch {
    const bull = e9 > e21 && rsiV < 65,
      dir = bull ? 1 : -1,
      sig = bull ? "BUY" : rsiV > 70 ? "SELL" : "WAIT";
    return {
      signal: sig,
      confidence: 6,
      entry: last.c,
      sl: last.c - dir * atrV,
      tp1: last.c + dir * atrV,
      tp2: last.c + dir * atrV * 2,
      tp3: last.c + dir * atrV * 3,
      reason: bull
        ? "EMA9 crossed EMA21 with RSI momentum — bullish continuation."
        : sig === "SELL"
        ? "Overbought rejection at resistance — bearish reversal."
        : "No clear setup — wait for confirmation.",
      pattern: bull ? "EMA Bullish Cross" : sig === "SELL" ? "Bearish Rejection" : "No Setup",
      tech: 6,
      sentiment: 5,
      macro: 5,
      news_risk: "MEDIUM",
      mood: "VOLATILE",
      smart: "Institutional accumulation visible below current structure.",
      beginner: bull
        ? "The short-term average crossed above the long-term — buyers are in control."
        : sig === "SELL"
        ? "Price bounced down from a key level — sellers are taking over."
        : "Market has no clear direction. Patience is a trade.",
      liq: "Liquidity pool sitting above equal highs — watch for sweep.",
      session: "London/NY overlap — highest liquidity window of the day.",
    };
  }
}

function useToast() {
  const [toast, setToast] = useState(null);
  const show = (message, type="success") => {
    setToast({ message, type, id: Date.now() });
  };
  const hide = () => setToast(null);
  return { toast, show, hide };
}

function Toast({ message, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3200); return () => clearTimeout(t); }, []);
  const cfg = {
    success: { bg:"#0d2218", border:"rgba(46,204,113,.4)",  icon:"✓", col:"#2ecc71" },
    error:   { bg:"#220d0d", border:"rgba(231,76,60,.4)",   icon:"✕", col:"#e74c3c" },
    warn:    { bg:"#221a0d", border:"rgba(224,160,64,.4)",  icon:"⚠", col:"#e0a040" },

  return (
    <div style={{position:"fixed",top:72,left:"50%",transform:"translateX(-50%)",zIndex:3000,
      maxWidth:340,width:"90%",background:cfg.bg,border:`1px solid ${cfg.border}`,

}

          textAlign: "center",

          background: "linear-gradient(90deg,#e0a040,#f0d070)",
          WebkitBackgroundClip: "text",

          maxWidth: 310,
          marginBottom: 52,

            onClick={() => setStep((s) => s - 1)}

  );
}

   CHART
================================================================ */
function CandleChart({ candles, ind, analysis, ov, pair }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !candles.length) return;
    const el = ref.current,
      ctx = el.getContext("2d"),
      DPR = window.devicePixelRatio || 1;
    el.width = el.offsetWidth * DPR;
    el.height = el.offsetHeight * DPR;
    ctx.scale(DPR, DPR);
    const W = el.offsetWidth,
      H = el.offsetHeight,
      pad = { t: 18, r: 74, b: 26, l: 6 };
    const cW = W - pad.l - pad.r,
      cH = H - pad.t - pad.b;
    const prices = candles.flatMap((c) => [c.h, c.l]);
    if (ov.bb && ind.bb) prices.push(...ind.bb.flatMap((b) => [b.upper, b.lower]));
    if (ov.fib && ind.fib) prices.push(ind.fib.r1, ind.fib.s0);
    if (ov.liq && ind.liq) {
      ind.liq.pools.forEach((p) => prices.push(p.price));
      ind.liq.orderBlocks.forEach((ob) => {
        prices.push(ob.top, ob.bottom);
      });
    }
    if (analysis) {
      prices.push(analysis.tp3, analysis.sl);
    }
    const minP = Math.min(...prices) * 0.9999,
      maxP = Math.max(...prices) * 1.0001,
      rng = maxP - minP;
    const toY = (p) => pad.t + cH - ((p - minP) / rng) * cH,
      toX = (i) => pad.l + (i / (candles.length - 1)) * cW;
    const cndW = Math.max(2, (cW / candles.length) * 0.7);
    ctx.fillStyle = "#040406";
    ctx.fillRect(0, 0, W, H);
    for (let i = 0; i <= 9; i++) {
      ctx.strokeStyle = i % 3 === 0 ? "rgba(224,160,64,.06)" : "rgba(255,255,255,.025)";
      ctx.lineWidth = 1;
      const y = pad.t + (i / 9) * cH;
      ctx.beginPath();
      ctx.moveTo(pad.l, y);
      ctx.lineTo(W - pad.r, y);
      ctx.stroke();
      const x = pad.l + (i / 9) * cW;
      ctx.beginPath();
      ctx.moveTo(x, pad.t);
      ctx.lineTo(x, pad.t + cH);
      ctx.stroke();
    }
    if (ov.liq && ind.liq) {
      ind.liq.orderBlocks.slice(-4).forEach((ob) => {
        const y1 = toY(ob.top),
          y2 = toY(ob.bottom),
          bull = ob.type === "bull";
        ctx.fillStyle = bull ? "rgba(46,204,113,.08)" : "rgba(231,76,60,.08)";
        ctx.fillRect(pad.l, y1, cW, y2 - y1);
        ctx.strokeStyle = bull ? "rgba(46,204,113,.35)" : "rgba(231,76,60,.35)";
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 4]);
        ctx.strokeRect(pad.l, y1, cW, y2 - y1);
        ctx.setLineDash([]);
        ctx.fillStyle = bull ? "rgba(46,204,113,.55)" : "rgba(231,76,60,.55)";
        ctx.font = "7px 'Courier New'";
        ctx.fillText(bull ? "OB↑" : "OB↓", W - pad.r + 2, y1 + 9);
      });
      ind.liq.fvgs.slice(-3).forEach((fvg) => {
        const y1 = toY(fvg.top),
          y2 = toY(fvg.bottom),
          bull = fvg.type === "bull";
        ctx.fillStyle = bull ? "rgba(91,155,213,.07)" : "rgba(155,127,234,.07)";
        ctx.fillRect(pad.l, y1, cW, y2 - y1);
        ctx.fillStyle = bull ? "rgba(91,155,213,.45)" : "rgba(155,127,234,.45)";
        ctx.font = "7px 'Courier New'";
        ctx.fillText("FVG", W - pad.r + 2, y1 + 8);
      });
      ind.liq.pools.slice(-5).forEach((pool) => {
        const y = toY(pool.price),
          sell = pool.type === "sell_side";
        ctx.strokeStyle = sell ? "rgba(231,76,60,.4)" : "rgba(46,204,113,.4)";
        ctx.lineWidth = pool.strength > 2 ? 1.5 : 1;
        ctx.setLineDash([2, 9]);
        ctx.beginPath();
        ctx.moveTo(pad.l, y);
        ctx.lineTo(W - pad.r, y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = sell ? "rgba(231,76,60,.5)" : "rgba(46,204,113,.5)";
        ctx.font = "7px 'Courier New'";
        ctx.fillText(sell ? "SSL" : "BSL", W - pad.r + 2, y + 3);
      });
    }
    if (ov.bb && ind.bb) {
      [
        ["upper", "rgba(200,150,60,.45)"],
        ["mid", "rgba(200,150,60,.22)"],
        ["lower", "rgba(200,150,60,.45)"],
      ].forEach(([k, c]) => {
        ctx.strokeStyle = c;
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 6]);
        ctx.beginPath();
        ind.bb.forEach((b, i) => {
          const x = toX(i),
            y = toY(b[k]);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.setLineDash([]);
      });
    }
    if (ov.fib && ind.fib) {
      [
        [ind.fib.r1, "1.0", "rgba(200,80,80,.65)"],
        [ind.fib.r382, "0.382", "rgba(200,140,60,.55)"],
        [ind.fib.r500, "0.5", "rgba(200,200,60,.55)"],
        [ind.fib.r618, "0.618", "rgba(60,180,120,.55)"],
        [ind.fib.s0, "0.0", "rgba(60,120,200,.65)"],
      ].forEach(([p, l, c]) => {
        const y = toY(p);
        ctx.strokeStyle = c;
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 8]);
        ctx.beginPath();
        ctx.moveTo(pad.l, y);
        ctx.lineTo(W - pad.r, y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = c;
        ctx.font = "7px 'Courier New'";
        ctx.fillText("F" + l, W - pad.r + 2, y + 3);
      });
    }
    if (ov.sr && ind.sr) {
      ind.sr.resistance.slice(0, 3).forEach((r, i) => {
        const y = toY(r);
        ctx.strokeStyle = `rgba(231,76,60,${0.85 - i * 0.22})`;
        ctx.lineWidth = i === 0 ? 1.5 : 1;
        ctx.setLineDash([8, 5]);
        ctx.beginPath();
        ctx.moveTo(pad.l, y);
        ctx.lineTo(W - pad.r, y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = `rgba(231,76,60,${0.85 - i * 0.22})`;
        ctx.font = "8px 'Courier New'";
        ctx.fillText(`R${i + 1}`, W - pad.r + 2, y - 2);
      });
      ind.sr.support.slice(0, 3).forEach((s, i) => {
        const y = toY(s);
        ctx.strokeStyle = `rgba(46,204,113,${0.85 - i * 0.22})`;
        ctx.lineWidth = i === 0 ? 1.5 : 1;
        ctx.setLineDash([8, 5]);
        ctx.beginPath();
        ctx.moveTo(pad.l, y);
        ctx.lineTo(W - pad.r, y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = `rgba(46,204,113,${0.85 - i * 0.22})`;
        ctx.font = "8px 'Courier New'";
        ctx.fillText(`S${i + 1}`, W - pad.r + 2, y + 9);
      });
    }
    if (ov.ema) {
      [
        { d: ind.ema9, c: "#e0a040", lbl: "9" },
        { d: ind.ema21, c: "#5b9bd5", lbl: "21" },
      ].forEach(({ d, c, lbl }) => {
        if (!d) return;
        ctx.strokeStyle = c;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        d.forEach((v, i) => {
          const x = toX(i),
            y = toY(v);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.fillStyle = c;
        ctx.font = "8px 'Courier New'";
        ctx.fillText(lbl, W - pad.r + 2, toY(d[d.length - 1]) + 3);
      });
    }
    if (analysis) {
      const eY = toY(analysis.entry),
        sY = toY(analysis.sl),
        isBuy = analysis.signal === "BUY";
      ctx.fillStyle = isBuy ? "rgba(46,204,113,.07)" : "rgba(231,76,60,.07)";
      ctx.fillRect(pad.l, Math.min(eY, toY(analysis.tp3)), cW, Math.abs(eY - toY(analysis.tp3)));
      ctx.fillStyle = "rgba(231,76,60,.07)";
      ctx.fillRect(pad.l, Math.min(eY, sY), cW, Math.abs(eY - sY));
      ctx.strokeStyle = "#e0a040";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5, 3]);
      ctx.beginPath();
      ctx.moveTo(pad.l, eY);
      ctx.lineTo(W - pad.r, eY);
      ctx.stroke();
      [
        [analysis.tp1, "TP1", 0.9],
        [analysis.tp2, "TP2", 0.65],
        [analysis.tp3, "TP3", 0.4],
      ].forEach(([price, lbl, op]) => {
        const y = toY(price);
        ctx.strokeStyle = `rgba(46,204,113,${op})`;
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 5]);
        ctx.beginPath();
        ctx.moveTo(pad.l, y);
        ctx.lineTo(W - pad.r, y);
        ctx.stroke();
        ctx.fillStyle = `rgba(46,204,113,${op})`;
        ctx.font = "bold 8px 'Courier New'";
        ctx.fillText(lbl, W - pad.r + 2, y + 3);
      });
      ctx.strokeStyle = "rgba(231,76,60,.9)";
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 5]);
      ctx.beginPath();
      ctx.moveTo(pad.l, sY);
      ctx.lineTo(W - pad.r, sY);
      ctx.stroke();
      ctx.fillStyle = "rgba(231,76,60,.9)";
      ctx.font = "bold 8px 'Courier New'";
      ctx.fillText("SL", W - pad.r + 2, sY + 3);
      ctx.setLineDash([]);
    }
    candles.forEach((c, i) => {
      const x = toX(i),
        oY = toY(c.o),
        cY = toY(c.c),
        hY = toY(c.h),
        lY = toY(c.l),
        bull = c.c >= c.o,
        col = bull ? "#2ecc71" : "#e74c3c";
      ctx.strokeStyle = col;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, hY);
      ctx.lineTo(x, Math.min(oY, cY));
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, lY);
      ctx.lineTo(x, Math.max(oY, cY));
      ctx.stroke();
      ctx.fillStyle = col;
      ctx.fillRect(x - cndW / 2, Math.min(oY, cY), cndW, Math.max(1.5, Math.abs(cY - oY)));
    });
    const last = candles[candles.length - 1],
      ly = toY(last.c);
    ctx.fillStyle = last.c >= last.o ? "#2ecc71" : "#e74c3c";
    ctx.fillRect(W - pad.r, ly - 9, pad.r, 18);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 9px 'Courier New'";
    ctx.fillText(last.c.toFixed(DEC(pair)), W - pad.r + 2, ly + 4);
    for (let i = 0; i <= 6; i++) {
      const p = minP + (i / 6) * rng,
        y = toY(p);
      ctx.fillStyle = "rgba(255,255,255,.15)";
      ctx.font = "8px 'Courier New'";
      ctx.fillText(p.toFixed(DEC(pair)), W - pad.r + 2, y + 3);
    }
  }, [candles, ind, analysis, ov, pair]);
  return <canvas ref={ref} style={{ width: "100%", height: "100%", display: "block" }} />;
}

function OscChart({ data, type }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !data.length) return;
    const el = ref.current,
      ctx = el.getContext("2d"),
      DPR = window.devicePixelRatio || 1;
    el.width = el.offsetWidth * DPR;
    el.height = el.offsetHeight * DPR;
    ctx.scale(DPR, DPR);
    const W = el.offsetWidth,
      H = el.offsetHeight;
    ctx.fillStyle = "#040406";
    ctx.fillRect(0, 0, W, H);
    if (type === "rsi") {
      [
        [70, "rgba(231,76,60,.35)", [3, 5]],
        [50, "rgba(255,255,255,.05)", []],
        [30, "rgba(46,204,113,.35)", [3, 5]],
      ].forEach(([v, c, d]) => {
        const y = H - (v / 100) * H;
        ctx.strokeStyle = c;
        ctx.lineWidth = 1;
        ctx.setLineDash(d);
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = "rgba(255,255,255,.25)";
        ctx.font = "8px 'Courier New'";
        ctx.fillText(v, 2, y - 2);
      });
      ctx.strokeStyle = "#e0a040";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      data.forEach((v, i) => {
        const x = (i / (data.length - 1)) * W,
          y = H - (v / 100) * H;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
      const last = data[data.length - 1];
      ctx.fillStyle = last > 70 ? "#e74c3c" : last < 30 ? "#2ecc71" : "#e0a040";
      ctx.font = "bold 10px 'Courier New'";
      ctx.fillText(`RSI ${last.toFixed(1)}`, W - 64, 13);
    } else {
      const vals = data.map((m) => m.macd),
        mn = Math.min(...vals),
        mx = Math.max(...vals),
        rng = mx - mn || 0.001,
        mid = H / 2;
      ctx.strokeStyle = "rgba(255,255,255,.05)";
      ctx.beginPath();
      ctx.moveTo(0, mid);
      ctx.lineTo(W, mid);
      ctx.stroke();
      data.forEach((m, i) => {
        const x = (i / (data.length - 1)) * W,
          bH = (m.hist / rng) * (H / 2);
        ctx.fillStyle = m.hist >= 0 ? "rgba(46,204,113,.7)" : "rgba(231,76,60,.7)";
        ctx.fillRect(x - 1.5, mid - bH, 3, bH);
      });
      ctx.strokeStyle = "#5b9bd5";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      data.forEach((m, i) => {
        const x = (i / (data.length - 1)) * W,
          y = mid - (m.signal / rng) * (H / 2);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
      const last = data[data.length - 1];
      ctx.fillStyle = last.hist >= 0 ? "#2ecc71" : "#e74c3c";
      ctx.font = "bold 10px 'Courier New'";
      ctx.fillText(`MACD ${last.hist >= 0 ? "▲" : "▼"}`, W - 70, 13);
    }
  }, [data, type]);
  return <canvas ref={ref} style={{ width: "100%", height: "100%", display: "block" }} />;
}

/* ================================================================

function SignalBanner({ analysis, pair, beginner, newSig }) {
  if (!analysis) return null;
  const sigC = analysis.signal === "BUY" ? "#2ecc71" : analysis.signal === "SELL" ? "#e74c3c" : "#888";
  const bg =
    analysis.signal === "BUY"
      ? "linear-gradient(135deg,#061410,#091d12)"
      : analysis.signal === "SELL"
      ? "linear-gradient(135deg,#140606,#1d0909)"
      : "linear-gradient(135deg,#101010,#161616)";
  const d = DEC(pair);
  return (
    <div
      style={{
        margin: "7px 11px",
        padding: "12px 13px",
        borderRadius: 10,
        background: bg,
        border: `2px solid ${sigC}44`,
        animation: newSig ? "glow369 1s ease 4" : "none",
      }}
    >
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
        <div
          style={{
            fontSize: 28,
            fontWeight: "bold",
            color: sigC,
            letterSpacing: 1,
            lineHeight: 1,
            minWidth: 110,
          }}
        >
          {analysis.signal === "BUY" ? "▲ BUY" : analysis.signal === "SELL" ? "▼ SELL" : "◆ WAIT"}
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 9, color: "rgba(255,255,255,.3)", marginBottom: 4 }}>{analysis.pattern}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
            <span style={{ fontSize: 8, color: "rgba(255,255,255,.25)", marginRight: 2 }}>CONF</span>
            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((n) => (
              <div
                key={n}
                style={{
                  width: 14,
                  height: 5,
                  borderRadius: 2,
                  background:
                    n <= analysis.confidence
                      ? n <= 3
                        ? "#e74c3c"
                        : n <= 6
                        ? "#e0a040"
                        : "#2ecc71"
                      : "rgba(255,255,255,.06)",
                }}
              />
            ))}
            <span style={{ fontSize: 9, color: "rgba(255,255,255,.3)", marginLeft: 3 }}>{analysis.confidence}/9</span>
          </div>
        </div>
      </div>
      <div
        style={{
          fontSize: 11,
          color: "rgba(255,255,255,.68)",
          fontStyle: "italic",
          borderLeft: `3px solid ${sigC}55`,
          paddingLeft: 10,
          lineHeight: 1.5,
          marginBottom: 10,
        }}
      >
        "{analysis.reason}"
      </div>
      <div
        style={{
          display: "grid",
          gridTemplateColumns: "repeat(4,1fr)",
          gap: 5,
          marginBottom: analysis.liq || analysis.smart || beginner ? 8 : 0,
        }}
      >
        {[
          ["ENTRY", analysis.entry?.toFixed(d), "#e0a040"],
          ["SL", analysis.sl?.toFixed(d), "#e74c3c"],
          ["TP1", analysis.tp1?.toFixed(d), "#2ecc71"],
          ["TP3", analysis.tp3?.toFixed(d), "#2ecc71"],
        ].map(([l, v, c]) => (
          <div key={l} style={{ background: "rgba(0,0,0,.3)", borderRadius: 6, padding: "6px 5px", textAlign: "center" }}>
            <div style={{ fontSize: 7, color: "rgba(255,255,255,.25)", marginBottom: 2, letterSpacing: 1 }}>{l}</div>
            <div style={{ fontSize: 10, fontWeight: "bold", color: c }}>{v}</div>
          </div>
        ))}
      </div>
      {(analysis.liq || analysis.smart) && (
        <div style={{ display: "flex", flexDirection: "column", gap: 3, marginBottom: beginner ? 8 : 0 }}>
          {analysis.liq && (
            <div style={{ fontSize: 9, color: "rgba(155,127,234,.7)" }}>◉ {analysis.liq}</div>
          )}
          {analysis.smart && <div style={{ fontSize: 9, color: "rgba(91,155,213,.7)" }}>◈ {analysis.smart}</div>}
        </div>
      )}
      {beginner && analysis.beginner && (
        <div
          style={{
            padding: "7px 9px",
            background: "rgba(91,155,213,.08)",
            borderRadius: 6,
            border: "1px solid rgba(91,155,213,.15)",
          }}
        >
          <div style={{ fontSize: 8, color: "#5b9bd5", letterSpacing: 1, marginBottom: 2 }}>◈ IN PLAIN ENGLISH</div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,.62)", lineHeight: 1.5 }}>{analysis.beginner}</div>
        </div>
      )}
    </div>
  );
}

/* ================================================================
   KAY CHAT
================================================================ */
function KAYChat({ memory, onMemory, beginner, emotionFlags }) {
  const defMsg = () => ({
    role: "assistant",
    content:
      "Hey — I'm KAY. Ask me anything about the market, your trade ideas, risk, or what's moving right now. I've got you.",
    time: new Date().toLocaleTimeString(),
  });
  const [msgs, setMsgs] = useState(() => {
    try {
      const s = DB.get("chat", []);
      return s.length ? s : [defMsg()];
    } catch {
      return [defMsg()];
    }
  });
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [warn, setWarn] = useState(null);
  const bottomRef = useRef(null);
  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [msgs]);
  useEffect(() => {
    DB.set("chat", msgs.slice(-40));
  }, [msgs]);
  useEffect(() => {
    if (emotionFlags?.length > 0) {
      const f = EFLAGS.find((x) => emotionFlags.includes(x.id));
      if (f) setWarn(f);
    } else setWarn(null);
  }, [emotionFlags]);
  const send = async () => {
    if (!input.trim() || busy) return;
    const um = { role: "user", content: input.trim(), time: new Date().toLocaleTimeString() };
    const upd = [...msgs, um];
    setMsgs(upd);
    setInput("");
    setBusy(true);
    const memCtx = memory.length ? `\nWhat you know about this user:\n${memory.map((m) => `- ${m}`).join("\n")}` : "";
    const bCtx = beginner ? "\nBEGINNER MODE: Explain clearly, define any jargon." : "";
    const eCtx = emotionFlags?.length
      ? `\nEMOTION ALERT: User may be showing: ${emotionFlags.join(", ")}. Address caringly if relevant.`
      : "";
    const reply = await callKAY(
      upd.map((m) => ({ role: m.role, content: m.content })),
      memCtx + bCtx + eCtx

}

/* ================================================================
   GOD MODE (with mistake analysis and export)
================================================================ */
function GodMode({ tradeLog, onLogTrade, pair, riskPct, showToast, analysis, executeTrade }) {
  const [showLog, setShowLog] = useState(false);
  const [kayRead, setKayRead] = useState(null);
  const [loading, setLoading] = useState(false);
  const [analysisResult, setAnalysisResult] = useState(null);
  const [selectedTrade, setSelectedTrade] = useState(null);
  const [nt, setNt] = useState({ pair, direction: "BUY", outcome: "win", pips: 0, emotionFlag: null });
  const em = detectEmotion(tradeLog, riskPct);
  const wins = tradeLog.filter((t) => t.outcome === "win").length;
  const losses = tradeLog.filter((t) => t.outcome === "loss").length;
  const be = tradeLog.filter((t) => t.outcome === "be").length;
  const total = wins + losses + be || 1;
  const wr = Math.round((wins / total) * 100);
  const pipsTotal = tradeLog.reduce((s, t) => s + (t.outcome === "win" ? t.pips : t.outcome === "loss" ? -t.pips : 0), 0);
  const bestPair = PAIRS.map((p) => ({
    p,
    pips: tradeLog.filter((t) => t.pair === p).reduce((s, t) => s + (t.outcome === "win" ? t.pips : t.outcome === "loss" ? -t.pips : 0), 0),
  })).sort((a, b) => b.pips - a.pips)[0];
  const eCounts = EFLAGS.map((f) => ({ ...f, count: tradeLog.filter((t) => t.emotionFlag === f.id).length })).sort((a, b) => b.count - a.count);
  const worst = eCounts[0]?.count > 0 ? eCounts[0] : null;
  const sc = (v) => (v <= 3 ? "#e74c3c" : v <= 6 ? "#e0a040" : "#2ecc71");

  const getRead = async () => {
    setLoading(true);
    const sum = `${wins}W/${losses}L/${be}BE. Win rate ${wr}%. Total pips ${pipsTotal.toFixed(0)}. Best pair: ${bestPair?.p || "unknown"}. Emotion flags: ${em.flags.join(", ") || "none"}. Worst habit: ${worst ? `${worst.label} (${worst.count}x)` : "none"}. Recent: ${
      tradeLog.slice(-5).map((t) => `${t.direction} ${t.pair}→${t.outcome} ${t.pips}p${t.emotionFlag ? " [" + t.emotionFlag + "]" : ""}`).join(", ") || "none"
    }.`;
    const r = await callKAY([{ role: "user", content: `Review this trader's performance and psychology honestly. Be direct, specific, no sugarcoating. Max 4 sentences.\n\n${sum}` }]);
    setKayRead(r);
    setLoading(false);
  };

  const analyzeTradeMistakes = async (trade) => {
    const analysis = await apiCall(`/trades/analyze/${trade.id}?accountSize=10000&volatility=MEDIUM&emotions=${em.flags.join(",")}`);
    if (analysis) {
      setAnalysisResult(analysis);
      setSelectedTrade(trade.id);
    } else {
      // Fallback local analysis
      const mistakes = [];
      if (trade.outcome === "loss") mistakes.push("Loss may indicate entry/exit issues.");
      if (em.flags.includes("revenge")) mistakes.push("Revenge trade detected: trading after a loss.");
      if (em.flags.includes("greedy")) mistakes.push("Greed detected: consecutive wins without reset.");
      if (riskPct > 3) mistakes.push(`Overleveraged: risked ${riskPct}% > 3% limit.`);
      setAnalysisResult({ mistakes: mistakes.map((m) => ({ description: m, suggestion: "Follow 369 risk rules.", severity: 7 })), kayAdvice: "Review your trades and stick to the protocol.", performanceScore: Math.max(1, 10 - mistakes.length * 2) });
      setSelectedTrade(trade.id);
    }
  };

  const log = () => {
    const t = { ...nt, id: Date.now(), timestamp: Date.now(), pips: Number(nt.pips) };
    onLogTrade(t);
    setNt({ pair, direction: "BUY", outcome: "win", pips: 0, emotionFlag: null });
    setShowLog(false);
  };

  const exportToTradingViewClick = async () => {
    await exportToTradingView(pair);
    showToast("PineScript exported! Import into TradingView.", "success");
  };

  return (
    <div style={{ padding: 14, fontFamily: "'Courier New',monospace", overflowY: "auto", height: "100%", boxSizing: "border-box" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
        <div style={{ fontSize: 10, color: "#e0a040", letterSpacing: 3 }}>⚡ GOD MODE</div>
        <div style={{ flex: 1, height: 1, background: "rgba(224,160,64,.2)" }} />
        <div style={{ fontSize: 9, color: "rgba(255,255,255,.25)" }}>{tradeLog.length} trades</div>
        <button
          onClick={exportToTradingViewClick}

            padding: "4px 8px",
            fontSize: 8,
            background: "rgba(224,160,64,.1)",
            border: "1px solid rgba(224,160,64,.3)",

            cursor: "pointer",

function App369() {

  const [killConfirm, setKillConfirm] = useState(false);
  const [killConfirmModal, setKillConfirmModal] = useState(false);
  const [tradeConfirm, setTradeConfirm] = useState(null);
  const [toastMsg, setToastMsg] = useState(null);

  const [backendStatus, setBackendStatus] = useState(false); // starts false; set true only when backend confirmed

  useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  useEffect(() => {
    DB.set("pair", pair);
  }, [pair]);
  useEffect(() => {
    // Check backend status
    fetch(`${BACKEND_URL}/price/${pair}`)
      .then(() => setBackendStatus(true))
      .catch(() => setBackendStatus(false));
  }, []);

  const loadData = useCallback(async () => {
    // Try real data first
    let realCandles = null;
    if (backendStatus === true) {
      try {
        const res = await fetch(`${BACKEND_URL}/candles/${pair}/${tf}`);
        if (res.ok) realCandles = await res.json();
      } catch {}
    }
    const finalCandles = realCandles && realCandles.length ? realCandles : genCandles(pair, 63);
    setCandles(finalCandles);
    setInd(buildInd(finalCandles));
  }, [pair, tf, backendStatus]);

  useEffect(() => {
    loadData();
  }, [loadData]);

  useEffect(() => {
    const t = setInterval(loadData, 9000);
    return () => clearInterval(t);
  }, [loadData]);

  const analyze = async () => {
    if (!candles.length) return;
    setLoading(true);
    try {
      const r = await kayAnalyze(candles, pair, tf, ind);
      setAnalysis(r);
      DB.set("analysis", r);
      const sig = { id: Date.now(), pair, tf, time: new Date().toLocaleTimeString(), ...r };
      const upd = [sig, ...signals].slice(0, 12);
      setSignals(upd);
      DB.set("signals", upd);
      setNewSig(true);

          body: `${r.signal} with ${r.confidence}/9 confidence\n${r.reason}`,
          icon: "/icon-192.png",
          tag: "kay-signal",

      }
    } finally {
      setLoading(false);
    }
  };

  const logTrade = (t) => {
    const upd = [...tradeLog, t].slice(-50);

  const handleMemory = (m) => {

    const units = Math.floor((riskAmt / (slPips * pipVal)) * 100000);
    
    const result = await executeRealTrade({

      direction: analysis.signal,
      units,
      stopLoss: analysis.sl,
      takeProfit: analysis.tp1,
      entry: analysis.entry,
      confidence: analysis.confidence,
      reason: analysis.reason,
    });
    
    if (result?.success) {

            </div>
            <div style={{ height: 58, borderRadius: 6, overflow: "hidden", border: "1px solid rgba(255,255,255,.04)", flexShrink: 0 }}>
              {ind.rsi && ind.macd && <OscChart data={osc === "rsi" ? ind.rsi : ind.macd} type={osc} />}
            </div>
            {ind.atr && ind.rsi && ind.macd && (
              <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                {[
                  ["ATR", ind.atr[ind.atr.length - 1]?.toFixed(DEC(pair)), "rgba(255,255,255,.4)"],
                  ["RSI", ((v) => ({ val: v.toFixed(1), col: v > 70 ? "#e74c3c" : v < 30 ? "#2ecc71" : "#e0a040" }))(ind.rsi[ind.rsi.length - 1])],
                  ["MACD", ((v) => ({ val: v.hist > 0 ? "▲ Bull" : "▼ Bear", col: v.hist > 0 ? "#2ecc71" : "#e74c3c" }))(ind.macd[ind.macd.length - 1])],
                  ["OB", `${ind.liq?.orderBlocks?.length || 0} zones`, "rgba(155,127,234,.7)"],
                  ["FVG", `${ind.liq?.fvgs?.length || 0} gaps`, "rgba(91,155,213,.7)"],
                ].map((item, i) => {
                  const l = item[0],
                    v = typeof item[1] === "object" ? item[1].val : item[1],
                    c = typeof item[1] === "object" ? item[1].col : item[2];
                  return (
                    <div key={i} style={{ padding: "4px 8px", background: "#0f0f0f", borderRadius: 5, border: "1px solid rgba(255,255,255,.04)" }}>
                      <span style={{ fontSize: 8, color: "rgba(255,255,255,.2)" }}>{l} </span>
                      <span style={{ fontSize: 9, color: c, fontWeight: "bold" }}>{v}</span>
                    </div>
                  );
                })}
              </div>
            )}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "7px 10px", background: "#0f0f0f", borderRadius: 6, border: "1px solid rgba(255,255,255,.04)" }}>
              <div>
                <span style={{ fontSize: 10, color: "rgba(255,255,255,.5)" }}>Beginner Mode</span>
                <span style={{ fontSize: 9, color: "rgba(255,255,255,.25)", marginLeft: 6 }}>KAY explains in plain English</span>
              </div>
              <div
                onClick={() => {
                  setBeginner((v) => {
                    DB.set("beginner", !v);
                    return !v;
                  });
                }}
                style={{
                  width: 40,
                  height: 22,
                  borderRadius: 11,
                  background: beginner ? "#e0a040" : "rgba(255,255,255,.1)",
                  position: "relative",
                  cursor: "pointer",
                  transition: "background .3s",
                  flexShrink: 0,
                }}
              >
                <div style={{ position: "absolute", top: 3, left: beginner ? 20 : 3, width: 16, height: 16, borderRadius: "50%", background: "#fff", transition: "left .3s" }} />
              </div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button
                onClick={analyze}
                disabled={loading}
                style={{
                  flex: 2,
                  padding: 14,
                  fontSize: 12,
                  background: loading ? "rgba(255,255,255,.04)" : "linear-gradient(135deg,#e0a040,#b87820)",
                  color: loading ? "rgba(255,255,255,.2)" : "#040406",
                  border: "none",
                  borderRadius: 8,
                  cursor: loading ? "default" : "pointer",
                  fontFamily: "'Courier New',monospace",
                  fontWeight: "bold",
                  letterSpacing: 3,
                  boxShadow: loading ? "none" : "0 0 20px rgba(224,160,64,.18)",
                  flexShrink: 0,
                }}
              >
                {loading ? "◈ KAY IS READING..." : "◈ ANALYZE 369"}
              </button>
              <button
                onClick={executeTrade}
                disabled={!analysis || analysis.signal === "WAIT"}
                style={{
                  flex: 1,
                  padding: 14,
                  fontSize: 12,
                  background: !analysis || analysis.signal === "WAIT" ? "rgba(255,255,255,.05)" : analysis.signal === "BUY" ? "#2ecc71" : "#e74c3c",
                  color: !analysis || analysis.signal === "WAIT" ? "rgba(255,255,255,.2)" : "#fff",
                  border: "none",
                  borderRadius: 8,
                  cursor: !analysis || analysis.signal === "WAIT" ? "default" : "pointer",
                  fontFamily: "'Courier New',monospace",
                  fontWeight: "bold",
                  letterSpacing: 1,
                }}
              >
                {!analysis || analysis.signal === "WAIT" ? "⏸ NO SIGNAL" : `▶ TRADE`}
              </button>
            </div>
          </div>
        )}
        {tab === "kay" && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", minHeight: 0 }}>
            <KAYChat memory={memory} onMemory={handleMemory} beginner={beginner} emotionFlags={em.flags} />
          </div>
        )}
        {tab === "sense" && (
          <div style={{ flex: 1, overflow: "hidden", minHeight: 0 }}>
            <SensePanel pair={pair} />
          </div>
        )}
        {tab === "risk" && (
          <div style={{ flex: 1, overflow: "hidden", minHeight: 0 }}>
            <RiskPanel analysis={analysis} pair={pair} onRiskChange={setRiskPct} />
          </div>
        )}
        {tab === "god" && (
          <div style={{ flex: 1, overflow: "hidden", minHeight: 0 }}>
            <GodMode tradeLog={tradeLog} onLogTrade={logTrade} pair={pair} riskPct={riskPct} showToast={showToast} analysis={analysis} executeTrade={executeTrade} />
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      <div style={{ display: "flex", borderTop: "1px solid rgba(255,255,255,.05)", background: "#040406", flexShrink: 0, paddingBottom: "env(safe-area-inset-bottom)", marginBottom: 0 }}>
        {TABS.map((t) => (
          <button
            key={t.id}
            onClick={() => {
              setTab(t.id);
              if (t.id === "chart") setNewSig(false);
            }}
            style={{
              flex: 1,
              padding: "9px 2px 7px",
              background: "transparent",
              color: tab === t.id ? "#e0a040" : "rgba(255,255,255,.2)",
              border: "none",
              borderTop: tab === t.id ? "2px solid #e0a040" : "2px solid transparent",
              cursor: "pointer",
              fontFamily: "'Courier New',monospace",
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: 2,
              position: "relative",
            }}
          >
            <span style={{ fontSize: 14 }}>{t.icon}</span>
            <span style={{ fontSize: 7, letterSpacing: 0.5 }}>{t.label}</span>
            {t.id === "chart" && newSig && tab !== "chart" && (
              <div style={{ position: "absolute", top: 5, right: "calc(50% - 18px)", width: 6, height: 6, borderRadius: "50%", background: "#e74c3c", animation: "pulse369 1s infinite" }} />
            )}
            {(t.id === "god" || t.id === "kay") && em.flags.length > 0 && tab !== t.id && (
              <div style={{ position: "absolute", top: 5, right: "calc(50% - 18px)", width: 6, height: 6, borderRadius: "50%", background: "#e0a040", animation: "pulse369 1s infinite" }} />
            )}
          </button>
        ))}
      </div>

      {/* KILL SWITCH BUTTON - Fixed bottom right */}
      <button
        onClick={killSwitch}
        style={{
          position: "fixed",
          bottom: 70,
          right: 12,
          width: 56,
          height: 56,
          borderRadius: 28,
          background: killConfirm ? "#ff6b6b" : "#e74c3c",
          color: "white",
          border: "2px solid rgba(255,255,255,.2)",
          fontSize: 24,
          fontWeight: "bold",
          cursor: "pointer",
          fontFamily: "'Courier New',monospace",
          boxShadow: "0 0 20px rgba(231,76,60,.5)",
          zIndex: 100,
          animation: killConfirm ? "pulseRed 0.5s infinite" : "pulse369 1s infinite",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
        }}
      >
        {killConfirm ? "⚠" : "🔴"}
      </button>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App369 />);

  </script>
</body>
</html>
